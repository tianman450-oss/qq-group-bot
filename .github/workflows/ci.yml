name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile bot.py
          python -m py_compile src/utils/study.py
          python -m py_compile src/utils/roleplay.py
          python -m py_compile src/plugins/chat_plugin/__init__.py
          python -m py_compile src/plugins/course_plugin/__init__.py
          python -m py_compile src/plugins/draw_plugin/__init__.py
          python -m py_compile src/plugins/scheduler_plugin/__init__.py

      - name: Plugin load smoke test
        run: |
          python -X utf8 -c "import nonebot; nonebot.init(); nonebot.load_plugins('src/plugins'); print('plugins_loaded')"

